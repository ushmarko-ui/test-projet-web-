<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="../CSS/connexion.css" />
    <title>Se connecter</title>
  </head>
  <body>
    <img src="/public/images/ReadyToWork.png" alt="logo" class="logo" />
    <div class="container">
      <div class="form">
        <h2>
          S'identifier
          <span
            id="error-message"
            style="
              display: block;
              color: #ff4d4d;
              font-size: 0.5em;
              margin-top: 5px;
            "
          ></span>
        </h2>

        <div class="inputBox">
          <input type="text" id="username" placeholder="Nom d'utilisateur" />
        </div>

        <div class="inputBox">
          <input type="password" id="password" placeholder="Mot de passe" />
        </div>

        <div class="inputBox">
          <input type="submit" id="submit-btn" value="Connexion" />
        </div>
      </div>
    </div>
    <script>
      document.getElementById("submit-btn").onclick = function () {
        const userTape = document.getElementById("username").value;
        const mdpTape = document.getElementById("password").value;
        const errorSpan = document.getElementById("error-message");
        const params = new URLSearchParams(window.location.search);
        const role = params.get("role");

        if (role === "admin") {
          // Identifiants pour l'Admin
          if (userTape === "admin_user" && mdpTape === "admin123") {
            localStorage.setItem("userRole", "admin");
            window.location.href = "../index.html";
          } else {
            errorSpan.innerText = "Identifiants Admin incorrects !";
          }
        } else if (role === "pilote") {
          if (userTape === "pilote_user" && mdpTape === "pilote123") {
            localStorage.setItem("userRole", "pilote");
            window.location.href = "../index.html";
          } else {
            errorSpan.innerText = "Identifiants Pilote incorrects !";
          }
        }
      };
    </script>
  </body>
</html>
