<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Stage Explorer - Se connecter</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap"
      rel="stylesheet"
    />

    <style>
      body {
        font-family: "Poppins", sans-serif;
        background:
          linear-gradient(rgba(0, 0, 0, 0.4), rgba(0, 0, 0, 0.4)),
          url("../image/panorama-lac-dallos-montagne-c-florianscala-1280x645-1734687992.jpg")
            no-repeat center center fixed;
        background-size: cover;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0;
      }

      .glass-container {
        width: 100%;
        max-width: 400px;
        padding: 40px;
        background: rgba(255, 255, 255, 0.1);
        backdrop-filter: blur(15px);
        -webkit-backdrop-filter: blur(15px);
        border-radius: 20px;
        border: 2px solid rgba(255, 255, 255, 0.2);
        box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
      }

      .logo-login {
        width: 180px;
        display: block;
        margin: 0 auto 30px auto;
      }

      .input-glass {
        background: rgba(255, 255, 255, 0.2) !important;
        border: 1px solid rgba(255, 255, 255, 0.3) !important;
        color: white !important;
        border-radius: 8px;
        padding: 12px;
      }

      .input-glass::placeholder {
        color: rgba(255, 255, 255, 0.8);
      }

      .btn-submit-custom {
        width: 100%;
        padding: 12px;
        border-radius: 30px;
        border: none;
        background: white;
        color: #333;
        font-weight: bold;
        transition: 0.3s;
      }

      .btn-submit-custom:hover {
        background: #2563eb;
        color: white;
        transform: scale(1.02);
      }

      #error-message {
        display: block;
        color: #ff4d4d;
        font-size: 0.85rem;
        margin-top: 8px;
        min-height: 1.2rem;
      }

      .link-highlight {
        color: #ffcc00;
        text-decoration: none;
        font-weight: bold;
      }

      .link-highlight:hover {
        color: white;
        text-decoration: underline;
      }
    </style>
  </head>
  <body>
    <div class="container d-flex flex-column align-items-center">
      <img src="/public/image/ReadyToWork.png" alt="logo" class="logo-login" />

      <div class="glass-container text-center">
        <h2 class="text-white mb-4 fw-bold">S'identifier</h2>

        <div class="form">
          <div class="mb-3">
            <input
              type="text"
              id="username"
              class="form-control input-glass"
              placeholder="Nom d'utilisateur"
            />
          </div>

          <div class="mb-3">
            <input
              type="password"
              id="password"
              class="form-control input-glass"
              placeholder="Mot de passe"
            />
          </div>

          <span id="error-message"></span>

          <div class="mt-4">
            <button
              type="button"
              id="submit-btn"
              class="btn-submit-custom shadow-sm"
            >
              Connexion
            </button>
          </div>

          <p class="mt-4 text-white small">
            Pas encore de compte ?
            <a href="#" class="link-highlight">Inscrivez-vous</a>
          </p>
        </div>
      </div>
    </div>

    <script>
      document.getElementById("submit-btn").onclick = function () {
        const userTape = document.getElementById("username").value;
        const mdpTape = document.getElementById("password").value;
        const errorSpan = document.getElementById("error-message");

        // Récupération du rôle dans l'URL (ex: ?role=admin)
        const params = new URLSearchParams(window.location.search);
        const role = params.get("role");

        if (!role) {
          errorSpan.innerText = "Erreur : Aucun rôle spécifié dans l'URL.";
          return;
        }

        if (role === "admin") {
          if (userTape === "admin_user" && mdpTape === "admin123") {
            localStorage.setItem("userRole", "admin");
            window.location.href = "../index.html";
          } else {
            errorSpan.innerText = "Identifiants Admin incorrects !";
          }
        } else if (role === "pilote") {
          if (userTape === "pilote_user" && mdpTape === "pilote123") {
            localStorage.setItem("userRole", "pilote");
            window.location.href = "../index.html";
          } else {
            errorSpan.innerText = "Identifiants Pilote incorrects !";
          }
        } else {
          errorSpan.innerText = "Rôle inconnu.";
        }
      };
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
