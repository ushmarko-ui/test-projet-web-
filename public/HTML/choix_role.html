<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Choisir un profil - Stage Explorer</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap"
      rel="stylesheet"
    />

    <style>
      body {
        font-family: "Poppins", sans-serif;
        background:
          linear-gradient(rgba(0, 0, 0, 0.4), rgba(0, 0, 0, 0.4)),
          url("../image/panorama-lac-dallos-montagne-c-florianscala-1280x645-1734687992.jpg")
            no-repeat center center fixed;
        background-size: cover;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0;
      }

      .glass-container {
        width: 100%;
        max-width: 450px;
        padding: 40px;
        background: rgba(255, 255, 255, 0.1);
        backdrop-filter: blur(15px);
        -webkit-backdrop-filter: blur(15px);
        border-radius: 20px;
        border: 2px solid rgba(255, 255, 255, 0.2);
        box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
      }

      .btn-choix-custom {
        display: block;
        width: 100%;
        padding: 15px;
        margin-top: 15px;
        background: #2563eb;
        color: #ffffff !important;
        text-decoration: none;
        text-align: center;
        border-radius: 8px;
        font-weight: 600;
        letter-spacing: 1px;
        text-transform: uppercase;
        transition: all 0.3s ease;
        border: 1px solid rgba(255, 255, 255, 0.1);
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
      }

      .btn-choix-custom:hover {
        background: #1e40af;
        transform: translateY(-3px);
        box-shadow: 0 6px 20px rgba(37, 99, 235, 0.4);
      }

      .link-highlight {
        color: #ffcc00;
        text-decoration: none;
        font-weight: bold;
      }

      .link-highlight:hover {
        color: white;
        text-decoration: underline;
      }

      h2 {
        color: white;
        font-weight: 700;
      }
      p.subtitle {
        color: rgba(255, 255, 255, 0.8);
      }
    </style>
  </head>
  <body>
    <div class="container d-flex flex-column align-items-center">
      <img
        src="/public/image/ReadyToWork.png"
        alt="logo"
        class="mb-4"
        style="width: 180px"
      />

      <div class="glass-container text-center">
        <h2 class="mb-2">Accéder à mon profil</h2>
        <p class="subtitle mb-4">Choisissez votre statut pour continuer :</p>

        <div class="d-grid gap-2">
          <a href="page_connexion.html?role=admin" class="btn-choix-custom">
            ADMINISTRATEUR
          </a>

          <a href="page_connexion.html?role=pilote" class="btn-choix-custom">
            PILOTE
          </a>

          <a href="page_connexion.html?role=etudiant" class="btn-choix-custom">
            ÉTUDIANT
          </a>
        </div>

        <div class="mt-5 pt-3 border-top border-secondary border-opacity-25">
          <p class="text-white small mb-0">
            Vous n'avez pas de compte ?
            <a href="page_creation_compte.html" class="link-highlight ms-1"
              >Enregistrez-vous</a
            >
          </p>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
