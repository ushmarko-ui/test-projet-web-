<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Stage Explorer - Trouver mon stage</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap"
      rel="stylesheet"
    />

    <style>
      body {
        font-family: "Poppins", sans-serif;
        background:
          linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.6)),
          url("../image/panorama-lac-dallos-montagne-c-florianscala-1280x645-1734687992.jpg")
            no-repeat center center fixed;
        background-size: cover;
        color: white;
        min-height: 100vh;
        margin: 0;
      }

      /* Bannière & Header */
      .hero-banner {
        height: 140px;
        background: url("../image/image_reunion.avif") center/cover;
        position: absolute;
        width: 100%;
        top: 0;
        z-index: -1;
        filter: brightness(0.5);
      }

      /* Zone de recherche (Inspirée de ton search2.css) */
      .recherche-container {
        background: linear-gradient(
          to bottom,
          rgb(165, 143, 143),
          rgb(128, 128, 223)
        );
        padding: 40px 0;
        margin-top: 20px;
        border-radius: 10px;
      }

      .glass-input {
        background: rgba(254, 254, 254, 0.7) !important;
        border: 3px solid rgba(0, 0, 0, 0.3) !important;
        color: black !important;
      }

      .btn-recherche-custom {
        background: rgba(255, 255, 255, 0.6);
        border: 3px solid rgba(0, 0, 0, 0.4);
        font-weight: bold;
        transition: 0.3s;
      }

      .btn-recherche-custom:hover {
        background: rgba(255, 255, 255, 0.2);
        transform: translateY(-2px);
      }

      /* Sidebar Filtres */
      .sidebar-filtres {
        background: rgba(255, 255, 255, 0.9);
        border-radius: 10px;
        padding: 20px;
        color: black;
        height: fit-content;
      }

      .sidebar-filtres legend {
        font-size: 1.1rem;
        font-weight: bold;
        margin-top: 15px;
        border-bottom: 2px solid #ddd;
      }

      .filter-scroll {
        max-height: 200px;
        overflow-y: auto;
        padding-right: 5px;
      }

      /* Section Offres */
      .offres-img {
        width: 100%;
        max-width: 300px;
        border-radius: 8px;
        transition: 0.3s;
      }

      .offres-img:hover {
        transform: scale(1.03);
      }

      .nav-link-custom {
        color: white;
        text-decoration: none;
        padding: 8px 15px;
        border-radius: 5px;
        transition: 0.3s;
      }

      .nav-link-custom:hover {
        background: rgba(255, 255, 255, 0.2);
      }

      .glass {
        background: var(--glass);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 15px;
      }

      h2 {
        -webkit-text-stroke-width: 2px;
        -webkit-text-stroke-color: rgb(26, 189, 230);
      }
      .hover-warning:hover {
        color: #ffcc00 !important;
      }
    </style>
  </head>
  <body>
    <div class="hero-banner"></div>

    <header class="container py-3">
      <div class="d-flex justify-content-between align-items-center px-lg-5">
        <a
          href="/public/Index.html"
          class="glass d-flex align-items-center p-2 px-3 text-decoration-none text-white"
        >
          <img
            src="../image/ReadyToWork.png"
            alt="Logo"
            height="35"
            class="me-2"
          />
          <span class="fw-bold">ReadyToWork</span>
        </a>
        <a
          href="/public/HTML/choix_role.html"
          class="glass d-flex align-items-center p-2 px-3 text-decoration-none text-white"
        >
          <img
            src="../image/image_reunion.avif"
            alt="Profil"
            class="rounded-circle me-2"
            width="30"
            height="30"
          />
          <span>Mon Profil</span>
        </a>
      </div>
      <h1 class="text-center mt-4 fw-bold text-uppercase">ReadyToWork</h1>
    </header>

    <nav class="container my-3">
      <hr class="text-white" />
      <div class="d-flex flex-wrap justify-content-center gap-3">
        <a
          href="/public/HTML/Trouver_mon_stage.html"
          class="nav-link-custom border"
          >Trouver mon stage</a
        >
        <a
          href="/public/HTML/Trouver_une_entreprise.html"
          class="nav-link-custom"
          >Trouver une entreprise</a
        >
        <a href="/public/HTML/liste_de_souhait.html" class="nav-link-custom"
          >Liste de souhaits</a
        >
        <a
          href="/public/HTML/page_connexion.html"
          class="nav-link-custom bg-primary px-3"
          style="display: none"
          >Se connecter</a
        >
      </div>
      <hr class="text-white" />
    </nav>

    <div class="container">
      <div class="recherche-container shadow">
        <form class="d-flex flex-wrap justify-content-center gap-3 px-3">
          <input
            type="text"
            class="form-control glass-input w-50"
            placeholder="Job, mot-clé ou entreprise"
          />
          <input
            type="text"
            class="form-control glass-input w-25"
            placeholder="Où"
          />
          <button class="btn btn-light border-dark fw-bold px-4" type="submit">
            Rechercher
          </button>
        </form>
      </div>
    </div>

    <main class="container my-5">
      <div class="row g-4">
        <aside class="col-lg-3">
          <div class="sidebar-filtres shadow">
            <h4 class="fw-bold mb-3">Filtres</h4>

            <legend>Région :</legend>
            <div class="filter-scroll">
              <div class="form-check">
                <input
                  class="form-check-input"
                  type="checkbox"
                  id="r1"
                  checked
                /><label class="form-check-label" for="r1">Grand-est</label>
              </div>
              <div class="form-check">
                <input class="form-check-input" type="checkbox" id="r2" /><label
                  class="form-check-label"
                  for="r2"
                  >Nouvelle-aquitaine</label
                >
              </div>
              <div class="form-check">
                <input class="form-check-input" type="checkbox" id="r3" /><label
                  class="form-check-label"
                  for="r3"
                  >Bretagne</label
                >
              </div>
            </div>

            <legend>Salaire :</legend>
            <div class="form-check">
              <input class="form-check-input" type="checkbox" id="s1" /><label
                class="form-check-label"
                for="s1"
                >500€</label
              >
            </div>
            <div class="form-check">
              <input class="form-check-input" type="checkbox" id="s2" /><label
                class="form-check-label"
                for="s2"
                >1000€</label
              >
            </div>

            <legend>Mode :</legend>
            <div class="form-check">
              <input
                class="form-check-input"
                type="checkbox"
                id="m1"
                checked
              /><label class="form-check-label" for="m1">Télétravail</label>
            </div>

            <legend>Domaine :</legend>
            <select class="form-select mt-2">
              <option>Informatique</option>
              <option>Marketing</option>
              <option>Vente</option>
            </select>
          </div>
        </aside>

        <section
          class="col-lg-9 text-center bg-white bg-opacity-10 rounded p-4 shadow"
        >
          <h2 class="mb-4 fw-bold">Offres</h2>
          <div
            class="row row-cols-1 row-cols-md-2 row-cols-xl-3 g-4 justify-content-center"
          >
            <div class="col">
              <img src="../image/offres.png" class="offres-img shadow" />
            </div>
            <div class="col">
              <img src="../image/offres.png" class="offres-img shadow" />
            </div>
            <div class="col">
              <img src="../image/offres.png" class="offres-img shadow" />
            </div>
          </div>
          <div class="mt-5">
            <button
              class="btn btn-recherche-custom px-5 py-2 rounded-pill"
              type="button"
            >
              Charger Plus
            </button>
          </div>
        </section>
      </div>
    </main>

    <footer class="bg-dark py-4 mt-5">
      <div class="container text-center">
        <div class="d-flex justify-content-center gap-4 mb-2">
          <a
            href="../HTML/politique.html"
            class="text-white-50 text-decoration-none small hover-warning"
            >Politique de confidentialité</a
          >
          <a
            href="../HTML/mentions.html"
            class="text-white-50 text-decoration-none small hover-warning"
            >Mentions légales</a
          >
        </div>
        <p class="text-secondary small mb-0">
          &copy; 2026 ReadyToWork. Tous droits réservés.
        </p>
      </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
